<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Nitro 2.0 - Local Test</title>
    <!-- Use Socket.io from CDN to match your local server -->
    <script src="https://cdn.socket.io/4.7.2/socket.io.min.js"></script>
    <style>
        body { font-family: sans-serif; background: #121212; color: #fff; margin:0; padding:20px; }
        .container { max-width: 500px; margin: 0 auto; background: #1e1e1e; padding: 20px; border-radius: 8px; }
        input, button { padding: 12px; margin: 8px 0; width: 100%; box-sizing: border-box; }
        button { background: #ca3e47; color: #fff; border:none; cursor:pointer; font-weight:bold; }
        .chat-view { height: 300px; overflow-y: auto; background: #000; padding:10px; margin:10px 0; }
        .msg { margin:5px 0; padding:10px; border-radius:5px; max-width: 80%; }
        .msg.me { background: #333; margin-left: auto; text-align: right; }
        .msg.them { background: #ca3e47; }
        .hidden { display: none; }
    </style>
</head>
<body>

<div id="auth-panel" class="container">
    <h2>Nitro 2.0</h2>
    <input type="text" id="u-name" placeholder="Username">
    <input type="password" id="u-pass" placeholder="Password">
    <button onclick="login()">LOGIN</button>
    <button onclick="register()" style="background:#222;">REGISTER</button>
</div>

<div id="chat-panel" class="container hidden">
    <h3 id="welcome">Welcome!</h3>
    <div id="status" style="color:#00ff00;">Connected</div>
    <hr>
    <input type="text" id="search-peer" placeholder="Search for a user...">
    <button onclick="findFriends()">Search</button>
    <div id="results"></div>
    <hr>
    <div id="chat-window" class="hidden">
        <h3 id="talking-to">Chatting</h3>
        <div id="messages" class="chat-view"></div>
        <div style="display:flex; gap:10px;">
            <input type="text" id="msg-content" placeholder="Type a message...">
            <button onclick="send()" style="width:80px;">Send</button>
        </div>
    </div>
</div>

<script>
    // --- IMPORTANT: CHANGE THIS TO YOUR .trycloudflare.com LINK ---
    const TUNNEL_URL = 'https://wool-corrected-anthropology-anthony.trycloudflare.com'; 

    let socket = null, me = null, activeChat = null;

    async function login() { doAuth('login'); }
    async function register() { doAuth('register'); }

    async function doAuth(type) {
        const u = document.getElementById('u-name').value, p = document.getElementById('u-pass').value;
        const res = await fetch(`${TUNNEL_URL}/api/${type}`, {
            method: 'POST', body: JSON.stringify({username:u, password:p}),
            headers: {'Content-Type': 'application/json'}
        });
        const data = await res.json();
        if(data.error) return alert(data.error);

        me = data.user;
        initSocket(data.token);
        document.getElementById('auth-panel').className = 'hidden';
        document.getElementById('chat-panel').className = 'container';
        document.getElementById('welcome').innerText = `Hello, ${me.username}!`;
    }

    function initSocket(token) {
        // Connect Socket.io to the tunnel address
        socket = io(TUNNEL_URL, { auth: { token } });

        socket.on('connect', () => {
            console.log("Socket connected!");
            document.getElementById('status').innerText = "Real-time Connected";
        });

        socket.on('receive_message', (msg) => {
            if (activeChat && (msg.sender_id === activeChat.id || msg.sender_id === me.id)) {
                renderMessages([...getHistory(), msg]);
            }
        });
    }

    async function findFriends() {
        const q = document.getElementById('search-peer').value;
        const res = await fetch(`${TUNNEL_URL}/api/users/search?q=${q}`);
        const data = await res.json();
        document.getElementById('results').innerHTML = data.users.map(u => 
            `<div>${u.username} <button onclick="setChat('${u.id}','${u.username}')" style="width:60px; padding:2px;">Chat</button></div>`
        ).join('');
    }

    function setChat(id, name) {
        activeChat = { id, name };
        document.getElementById('chat-window').className = '';
        document.getElementById('talking-to').innerText = "Chatting with " + name;
        loadHistory();
    }

    async function loadHistory() {
        const res = await fetch(`${TUNNEL_URL}/api/messages/${activeChat.id}`);
        const data = await res.json();
        renderMessages(data.messages);
    }

    function renderMessages(msgs) {
        const box = document.getElementById('messages');
        box.innerHTML = msgs.map(m => 
            `<div class="msg ${m.sender_id === me.id ? 'me' : 'them'}">${m.content}</div>`
        ).join('');
        box.scrollTop = box.scrollHeight;
    }

    function send() {
        const content = document.getElementById('msg-content').value;
        socket.emit('send_message', { receiver_id: activeChat.id, content });
        document.getElementById('msg-content').value = '';
    }
</script>
</body>
</html>
