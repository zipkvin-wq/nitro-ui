<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Nitro Lite</title>
    <style>
        body { font-family: sans-serif; background: #121212; color: white; margin: 0; padding: 20px; }
        .container { max-width: 600px; margin: 0 auto; background: #1e1e1e; padding: 20px; border-radius: 8px; }
        input, button { padding: 10px; margin: 5px 0; width: 100%; box-sizing: border-box; }
        button { background: #ca3e47; color: white; border: none; cursor: pointer; }
        .chat-box { height: 300px; overflow-y: auto; background: #000; padding: 10px; margin-bottom: 10px; }
        .msg { margin: 5px 0; padding: 8px; border-radius: 4px; }
        .msg.sent { background: #2a2a2a; text-align: right; }
        .msg.received { background: #ca3e47; }
        .hidden { display: none; }
    </style>
</head>
<body>

<div class="container" id="auth-screen">
    <h2>Nitro Lite - Login/Register</h2>
    <input type="text" id="username" placeholder="Username">
    <input type="password" id="password" placeholder="Password">
    <button onclick="login()">Login</button>
    <button onclick="register()">Register</button>
    <p id="auth-error" style="color:red;"></p>
</div>

<div class="container hidden" id="app-screen">
    <h2 id="welcome-msg">Welcome</h2>
    <hr>
    
    <h3>Add Friend</h3>
    <div style="display:flex; gap:10px;">
        <input type="text" id="search-query" placeholder="Username to search">
        <button onclick="searchUsers()">Search</button>
    </div>
    <div id="search-results"></div>

    <hr>
    <h3>Friends</h3>
    <div id="friends-list"></div>

    <hr>
    <div id="chat-section" class="hidden">
        <h3 id="chat-with">Chat</h3>
        <button onclick="startCall()" style="background:#4db8ff; margin-bottom:10px;">Call</button>
        <div class="chat-box" id="chat-box"></div>
        <div style="display:flex; gap:10px;">
            <input type="text" id="msg-input" placeholder="Type a message...">
            <button onclick="sendMessage()">Send</button>
        </div>
    </div>
</div>

<!-- Call UI -->
<div id="call-screen" class="container hidden" style="position:fixed; top:0; left:0; right:0; bottom:0; z-index:100; height:100vh; max-width:none; border-radius:0;">
    <h2 id="call-status">Call...</h2>
    <audio id="remote-audio" autoplay playsinline></audio>
    <div id="incoming-call-actions" class="hidden">
        <button onclick="acceptCall()" style="background:#4db8ff;">Accept</button>
        <button onclick="endCall()">Reject</button>
    </div>
    <div id="active-call-actions" class="hidden">
        <button onclick="endCall()">End Call</button>
    </div>
</div>

<script src="/socket.io/socket.io.js"></script>
<script>
    let token = '';
    let currentUser = null;
    let currentChatId = null;
    let socket = null;

    // WebRTC globals
    let peerConnection = null;
    let localStream = null;
    let callTargetId = null;
    let incomingOffer = null;

    const ICE_SERVERS = {
        iceServers: [{ urls: 'stun:stun.l.google.com:19302' }]
    };

    const API_URL = ''; // Same origin

    async function register() {
        const u = document.getElementById('username').value;
        const p = document.getElementById('password').value;
        const res = await fetch(API_URL + '/api/register', {
            method: 'POST', headers: {'Content-Type':'application/json'},
            body: JSON.stringify({username: u, password: p, public_key: 'dummy_key'})
        });
        const data = await res.json();
        if(data.error) return alert(data.error);
        handleLoginSuccess(data);
    }

    async function login() {
        const u = document.getElementById('username').value;
        const p = document.getElementById('password').value;
        const res = await fetch(API_URL + '/api/login', {
            method: 'POST', headers: {'Content-Type':'application/json'},
            body: JSON.stringify({username: u, password: p})
        });
        const data = await res.json();
        if(data.error) return alert(data.error);
        handleLoginSuccess(data);
    }

    function handleLoginSuccess(data) {
        token = data.token;
        currentUser = data.user;
        document.getElementById('auth-screen').classList.add('hidden');
        document.getElementById('app-screen').classList.remove('hidden');
        document.getElementById('welcome-msg').innerText = `Welcome, ${currentUser.username}!`;
        
        connectSocket();
        loadFriends();
    }

    function connectSocket() {
        socket = io();
        socket.on('connect', () => {
            socket.emit('authenticate', { token });
        });
        
        socket.on('new_message', (msg) => {
            if(msg.sender_id === currentChatId) {
                appendMessage(msg.content, 'received');
            } else {
                alert('New message received!');
            }
        });

        socket.on('message_sent', (msg) => {
            appendMessage(msg.content, 'sent');
        });

        // --- WebRTC Socket Events ---
        socket.on('incoming_call', (data) => {
            callTargetId = data.caller_id;
            incomingOffer = data.offer;
            
            document.getElementById('call-screen').classList.remove('hidden');
            document.getElementById('incoming-call-actions').classList.remove('hidden');
            document.getElementById('active-call-actions').classList.add('hidden');
            document.getElementById('call-status').innerText = 'Incoming Call...';
        });

        socket.on('call_answered', async (data) => {
            if (peerConnection) {
                await peerConnection.setRemoteDescription(new RTCSessionDescription(data.answer));
                document.getElementById('call-status').innerText = 'Connected';
            }
        });

        socket.on('ice_candidate', async (data) => {
            if (peerConnection && data.candidate) {
                await peerConnection.addIceCandidate(new RTCIceCandidate(data.candidate));
            }
        });

        socket.on('call_ended', () => {
            closeCallUI();
        });
    }

    // --- WebRTC Logic ---

    async function setupPeerConnection() {
        peerConnection = new RTCPeerConnection(ICE_SERVERS);
        
        peerConnection.onicecandidate = event => {
            if (event.candidate) {
                socket.emit('ice_candidate', {
                    target_id: callTargetId,
                    candidate: event.candidate
                });
            }
        };

        peerConnection.ontrack = event => {
            const audio = document.getElementById('remote-audio');
            audio.srcObject = event.streams[0];
        };

        localStream = await navigator.mediaDevices.getUserMedia({ audio: true });
        localStream.getTracks().forEach(track => peerConnection.addTrack(track, localStream));
    }

    async function startCall() {
        if (!currentChatId) return;
        callTargetId = currentChatId;
        
        document.getElementById('call-screen').classList.remove('hidden');
        document.getElementById('incoming-call-actions').classList.add('hidden');
        document.getElementById('active-call-actions').classList.remove('hidden');
        document.getElementById('call-status').innerText = 'Calling...';

        await setupPeerConnection();
        const offer = await peerConnection.createOffer();
        await peerConnection.setLocalDescription(offer);

        socket.emit('call_user', {
            target_id: callTargetId,
            offer: offer
        });
    }

    async function acceptCall() {
        document.getElementById('incoming-call-actions').classList.add('hidden');
        document.getElementById('active-call-actions').classList.remove('hidden');
        document.getElementById('call-status').innerText = 'Connecting...';

        await setupPeerConnection();
        await peerConnection.setRemoteDescription(new RTCSessionDescription(incomingOffer));
        const answer = await peerConnection.createAnswer();
        await peerConnection.setLocalDescription(answer);

        socket.emit('call_answer', {
            caller_id: callTargetId,
            answer: answer
        });
    }

    function endCall() {
        if (callTargetId) {
            socket.emit('call_end', { target_id: callTargetId });
        }
        closeCallUI();
    }

    function closeCallUI() {
        if (peerConnection) {
            peerConnection.close();
            peerConnection = null;
        }
        if (localStream) {
            localStream.getTracks().forEach(t => t.stop());
            localStream = null;
        }
        document.getElementById('call-screen').classList.add('hidden');
        const audio = document.getElementById('remote-audio');
        audio.srcObject = null;
        callTargetId = null;
        incomingOffer = null;
    }

    async function searchUsers() {
        const q = document.getElementById('search-query').value;
        const res = await fetch(`${API_URL}/api/users/search?q=${q}`, {
            headers: {'Authorization': `Bearer ${token}`}
        });
        const data = await res.json();
        const div = document.getElementById('search-results');
        div.innerHTML = data.users.map(u => 
            `<div>${u.username} <button onclick="addFriend(${u.id})">Add</button></div>`
        ).join('');
    }

    async function addFriend(id) {
        await fetch(`${API_URL}/api/friends/add`, {
            method: 'POST', headers: {'Content-Type':'application/json', 'Authorization': `Bearer ${token}`},
            body: JSON.stringify({friend_id: id})
        });
        alert('Friend added!');
        loadFriends();
    }

    async function loadFriends() {
        const res = await fetch(`${API_URL}/api/friends`, {
            headers: {'Authorization': `Bearer ${token}`}
        });
        const data = await res.json();
        const div = document.getElementById('friends-list');
        div.innerHTML = data.friends.map(f => 
            `<div>${f.username} <button onclick="openChat(${f.id}, '${f.username}')">Chat</button></div>`
        ).join('');
    }

    function openChat(id, name) {
        currentChatId = id;
        document.getElementById('chat-section').classList.remove('hidden');
        document.getElementById('chat-with').innerText = `Chat with ${name}`;
        document.getElementById('chat-box').innerHTML = ''; // Clear for demo
    }

    function sendMessage() {
        const input = document.getElementById('msg-input');
        const text = input.value;
        if(!text || !currentChatId) return;

        socket.emit('send_message', {
            receiver_id: currentChatId,
            content: text // Plain text for this simplified test version
        });
        input.value = '';
    }

    function appendMessage(text, type) {
        const box = document.getElementById('chat-box');
        const div = document.createElement('div');
        div.className = `msg ${type}`;
        div.innerText = text;
        box.appendChild(div);
        box.scrollTop = box.scrollHeight;
    }
</script>
</body>
</html>
